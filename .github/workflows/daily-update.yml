name: Daily Macro Data Update

on:
  schedule:
    - cron: '17 7 * * *'   # 07:17 UTC daily = 15:17 Taiwan time
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet yfinance

      - name: Refresh macro data and rebuild dashboard
        run: |
          python update_data.py
          python build.py

      - name: Commit updated files
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data.json dashboard.html
          git diff --staged --quiet || git commit -m "chore: daily macro data update $(date -u +'%Y-%m-%d')"
          git push
